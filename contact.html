            <!-- Right: Contact Form -->
            <div class="contact-right">
                <form class="contact-form" id="contactForm" novalidate aria-label="Contact form">

                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <div class="input-wrapper">
                            <span class="input-icon" aria-hidden="true">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                            </span>
                            <input
                                type="text"
                                id="fullName"
                                name="fullName"
                                placeholder="Enter your full name..."
                                required
                                autocomplete="name"
                                aria-required="true"
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <span class="input-icon" aria-hidden="true">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect width="20" height="16" x="2" y="4" rx="2"/>
                                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                                </svg>
                            </span>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="Enter your email address..."
                                required
                                autocomplete="email"
                                aria-required="true"
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="message">Message <span class="char-hint" aria-live="polite" id="charCount">0/500</span></label>
                        <div class="input-wrapper textarea-wrapper">
                            <textarea
                                id="message"
                                name="message"
                                placeholder="Enter your message here..."
                                required
                                maxlength="500"
                                rows="5"
                                aria-required="true"
                                aria-describedby="charCount"
                            ></textarea>
                        </div>
                    </div>

                    <label class="privacy-check">
                        <input type="checkbox" id="privacy" name="privacy" required aria-required="true">
                        <span class="custom-checkbox" aria-hidden="true"></span>
                        I hereby agree to the
                        <a href="#" class="privacy-link">Privacy Policy</a> terms.
                    </label>

                    <button type="submit" class="submit-btn">
                        Submit Form
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
                        </svg>
                    </button>

                    <p class="form-success" id="formSuccess" role="alert" aria-live="assertive">
                        &#10003; Message sent successfully! I'll get back to you soon.
                    </p>
                </form>
            </div>

        </section>
    </main>

    <script>
        // Character counter
        const textarea = document.getElementById('message');
        const charCount = document.getElementById('charCount');
        textarea.addEventListener('input', () => {
            charCount.textContent = `${textarea.value.length}/500`;
        });

        // Form submission (client-side demo — wire up a backend/service as needed)
        const form = document.getElementById('contactForm');
        const successMsg = document.getElementById('formSuccess');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            successMsg.classList.add('visible');
            form.reset();
            charCount.textContent = '0/500';
            setTimeout(() => successMsg.classList.remove('visible'), 5000);
        });
    </script>
