    <script>
        (function() {
            const btn = document.getElementById('themeToggle');
            const icon = btn.querySelector('.theme-toggle-icon');
            const roleFrame = document.getElementById('homeRoleFrame');
            const roles = Array.from(document.querySelectorAll('.home-role-chip'));
            let roleIndex = 0;
            function apply(mode) {
                document.documentElement.classList.toggle('light-mode', mode === 'light');
                icon.textContent = mode === 'light' ? '\u2600\ufe0f' : '\ud83c\udf19';
            }
            function setActiveRole(index) {
                roles.forEach((role, i) => {
                    role.classList.toggle('active', i === index);
                });
                if (roleFrame && roles[index]) {
                    const activeRole = roles[index];
                    const frameWidth = activeRole.offsetWidth + 28;
                    const frameX = activeRole.offsetLeft + (activeRole.offsetWidth / 2) - (frameWidth / 2);
                    roleFrame.style.width = frameWidth + 'px';
                    roleFrame.style.transform = 'translateX(' + frameX + 'px) translateY(-50%)';
                }
            }
            apply(localStorage.getItem('theme') || 'dark');
            btn.addEventListener('click', function() {
                const next = document.documentElement.classList.contains('light-mode') ? 'dark' : 'light';
                localStorage.setItem('theme', next);
                apply(next);
            });
            if (roles.length) {
                setActiveRole(roleIndex);
                window.setInterval(function() {
                    roleIndex = (roleIndex + 1) % roles.length;
                    setActiveRole(roleIndex);
                }, 3000);
            }
        })();
    </script>
